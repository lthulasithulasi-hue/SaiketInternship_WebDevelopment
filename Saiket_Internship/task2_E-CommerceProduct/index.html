<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-container">

        <div class="product-image">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800"
                 alt="Product Image">
        </div>

        <div class="product-details">

            <h1>Premium Running Shoes</h1>

            <p class="price">₹2,999</p>

            <p class="description">
                Experience comfort and performance with our premium
                running shoes. Designed for everyday use, jogging,
                and sports activities.
            </p>

            <div class="features">
                <h3>Key Features</h3>
                <ul>
                    <li>Lightweight Design</li>
                    <li>Breathable Material</li>
                    <li>Comfortable Cushioning</li>
                    <li>Durable Sole</li>
                </ul>
            </div>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" min="1" value="1">

            <button class="cart-btn">Add to Cart</button>

        </div>

    </div>

</body>
</html>
